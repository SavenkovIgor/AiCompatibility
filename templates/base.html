<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">
  <link rel="canonical" href="{% block canonical %}{{ config.base_url }}{% endblock canonical %}">
  <meta property="og:title" content="{{ config.title }}">
  <meta property="og:description" content="{{ config.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ config.base_url }}">
  <style>
    :root { color-scheme: light dark; }
    body {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.25rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #8888; padding: 0.4rem 0.6rem; text-align: left; }
    table { display: block; overflow-x: auto; }
    code { padding: 0.1rem 0.3rem; background: #8881; border-radius: 3px; }
    pre { padding: 1rem; overflow-x: auto; background: #8881; border-radius: 6px; }
    pre code { padding: 0; background: none; }
    footer { margin-top: 3rem; font-size: 0.85rem; opacity: 0.7; }
  </style>
</head>
<body>
  {% block content %}{% endblock content %}
  <footer>
    <a href="https://github.com/SavenkovIgor/AiCompatibility">Source on GitHub</a>
  </footer>
</body>
</html>
